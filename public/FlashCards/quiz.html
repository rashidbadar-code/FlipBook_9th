<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Short Questions</title>
  <style>
    /* ── FONTS ── */
    @font-face { font-family:'Inter'; src:url('./template/fonts/Inter-VariableFont_opsz,wght.ttf') format('truetype'); font-weight:100 900; font-style:normal; font-display:swap; }
    @font-face { font-family:'Inter'; src:url('./template/fonts/Inter-Italic-VariableFont_opsz,wght.ttf') format('truetype'); font-weight:100 900; font-style:italic; font-display:swap; }

    /* ── DESIGN TOKENS — LIGHT ── */
    :root {
      --blue:          #1a73e8;
      --blue-soft:     #e8f0fe;
      --blue-border:   #c5d9fc;
      --green:         #1a7f3c;
      --green-soft:    #e6f4ea;
      --green-border:  #b6dfc5;
      --orange:        #d84315;
      --orange-soft:   #fbe9e7;
      --orange-border: #ffab91;
      --surface:       #ffffff;
      --surface-2:     #f5f7ff;
      --bg:            #f0f4f9;
      --text:          #111827;
      --text-sub:      #4b5563;
      --text-muted:    #9ca3af;
      --border:        #e0e7f5;
      --border-2:      #c9d5ee;
      --sh-sm: 0 1px 2px rgba(0,0,0,.06), 0 2px 6px rgba(0,0,0,.04);
      --sh-md: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --sh-lg: 0 8px 40px rgba(15,25,80,.14), 0 20px 60px rgba(15,25,80,.09);
      --glow-q: 0 0 0 3px rgba(26,115,232,.14), 0 8px 36px rgba(26,115,232,.22);
      --glow-a: 0 0 0 3px rgba(26,127,60,.14), 0 8px 36px rgba(26,127,60,.22);
      --glow-e: 0 0 0 3px rgba(216,67,21,.14), 0 8px 36px rgba(216,67,21,.22);
      --r-card: 16px;
      --r-btn:  20px;
      --ease:   cubic-bezier(0.4,0,0.2,1);
    }

    /* ── DARK MODE TOKENS ── */
    [data-theme="dark"] {
      --blue:          #7cb9ff;
      --blue-soft:     rgba(102,168,255,.13);
      --blue-border:   rgba(102,168,255,.28);
      --green:         #4ade80;
      --green-soft:    rgba(74,222,128,.12);
      --green-border:  rgba(74,222,128,.28);
      --orange:        #fb923c;
      --orange-soft:   rgba(251,146,60,.12);
      --orange-border: rgba(251,146,60,.28);
      --surface:       #16161a;
      --surface-2:     #1e1e24;
      --bg:            #0d0d10;
      --text:          #f0eeff;
      --text-sub:      #9f9cbf;
      --text-muted:    #5c5a7a;
      --border:        #2a2840;
      --border-2:      #38354e;
      --sh-sm: 0 1px 3px rgba(0,0,0,.6),  0 2px 8px rgba(0,0,0,.45);
      --sh-md: 0 4px 12px rgba(0,0,0,.65), 0 8px 28px rgba(0,0,0,.5);
      --sh-lg: 0 12px 48px rgba(0,0,0,.75), 0 24px 72px rgba(0,0,0,.6);
      --glow-q: 0 0 0 1px rgba(102,168,255,.2), 0 8px 40px rgba(102,168,255,.18), 0 0 80px rgba(102,168,255,.06);
      --glow-a: 0 0 0 1px rgba(74,222,128,.2),  0 8px 40px rgba(74,222,128,.18),  0 0 80px rgba(74,222,128,.05);
      --glow-e: 0 0 0 1px rgba(251,146,60,.2),  0 8px 40px rgba(251,146,60,.18),  0 0 80px rgba(251,146,60,.05);
    }

    /* ── BASE ── */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 16px clamp(8px, 2.5vw, 32px);
      color: var(--text);
      position: relative;
      transition: background 0.35s ease, color 0.35s ease;
    }

    /* ── MESH BACKGROUND ── */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: radial-gradient(ellipse 90% 50% at 50% -5%, rgba(26,115,232,.07) 0%, transparent 65%);
    }
    [data-theme="dark"] body::before {
      background:
        radial-gradient(ellipse 70% 45% at 20% 10%,  rgba(102,168,255,.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 90%,  rgba(139,92,246,.07)  0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 50% 50%,  rgba(74,222,128,.03)  0%, transparent 70%);
    }

    /* z-layer: everything above pseudo-bg */
    .top-bar, .progress-wrap, .dot-row,
    .glow-ring, .nav-row, .kbd-hint, .done-screen { position: relative; z-index: 1; }

    /* ════════════════════════════════ TOP BAR ════════ */
    .top-bar {
      width: 100%; max-width: 680px;
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 10px;
    }

    .topic-pill {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; border: none;
      border-radius: 40px; padding: 4px 4px;
    }
    .topic-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--blue); opacity: .6;
    }
    .topic-label { font-size: 20px; font-weight: 600; color: var(--text-sub); letter-spacing: .01px; }

    .hdr-right { display: flex; align-items: center; gap: 10px; }

    .streak-badge {
      display: inline-flex; align-items: center; gap: 4px;
      font-size: clamp(11px, 1.1vw, 17px); font-weight: 700; color: #b85c00;
      background: #fff3e0; border: 1px solid #ffcc80;
      border-radius: 20px; padding: 4px 11px;
      transition: opacity .2s var(--ease), transform .2s var(--ease);
    }
    [data-theme="dark"] .streak-badge { background: rgba(255,167,38,.12); border-color: rgba(255,167,38,.35); color: #ffb74d; }
    .streak-badge.hidden { opacity:0; pointer-events:none; transform:scale(0.78); }

    .counter { font-size: 14px; font-weight: 500; color: var(--text-sub); font-variant-numeric: tabular-nums; min-width: 52px; text-align: center; }

    .icon-btn {
      width: 44px; height: 44px; border-radius: 50%;
      border: 1.5px solid var(--border); background: var(--surface);
      color: var(--text-sub); cursor: pointer; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      box-shadow: var(--sh-sm);
      transition: background .18s var(--ease), border-color .18s var(--ease), transform .18s var(--ease);
    }
    .icon-btn:hover { background: var(--surface-2); border-color: var(--blue); color: var(--blue); transform: scale(1.1); }

    /* ════════════════════════════════ PROGRESS ════════ */
    .progress-wrap {
      width: 100%; max-width: 680px;
      margin-bottom: 12px;
    }
    .progress-track {
      height: 4px; background: var(--border); border-radius: 4px; overflow: hidden;
      transition: background .3s;
    }
    .progress-fill {
      height: 100%; width: 0%; border-radius: 5px;
      background: #1a73e8;
      transition: width .55s var(--ease);
    }

    /* ════════════════════════════════ DOTS ════════ */
    .dot-row { display: none; }
    .dot {
      width: 13px; height: 13px; border-radius: 50%;
      background: var(--border); border: 2px solid var(--border-2);
      transition: background .25s, transform .2s, box-shadow .25s;
      cursor: default;
    }
    .dot.cur  { background: var(--blue); border-color: var(--blue); transform: scale(1.5); box-shadow: 0 0 0 3px rgba(26,115,232,.22); }
    .dot.done { background: var(--green); border-color: var(--green); }
    .dot.exp  { background: var(--orange); border-color: var(--orange); }

    /* ════════════════════════════════ GLOW RING ════════ */
    .glow-ring {
      flex: 1; min-width: 0; max-width: 680px;
      width: 100%; order: 2;
      height: clamp(460px, 72vh, 600px);
      display: flex; flex-direction: column;
      border-radius: var(--r-card);
      padding: 0;
      transition: box-shadow .55s var(--ease);
    }
    .glow-ring.q, .glow-ring.a, .glow-ring.e { box-shadow: none; }

    /* ════════════════════════════════ CARD ════════ */
    .scene {
      width: 100%; height: 100%;
      perspective: 1400px;
      transition: opacity .2s ease;
    }
    .scene.switching { opacity:0; pointer-events:none; }

    .card {
      width: 100%; height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform .7s cubic-bezier(0.38, 0.08, 0.1, 1);
    }
    .card.flipped   { transform: rotateY(180deg); }
    .card.explained { transform: rotateY(360deg); }

    /* ── Faces ── */
    .card-face {
      position: absolute; inset: 0;
      border-radius: var(--r-card);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      display: flex; flex-direction: column;
      background: var(--surface);
      border: 1.5px solid rgba(255,255,255,1);
      border-bottom-color: rgba(150,170,210,.65);
      border-right-color:  rgba(150,170,210,.65);
      box-shadow:
        inset  3px  3px 0   rgba(255,255,255,1),
        inset -1px -1px 0   rgba(130,155,200,.35),
        0  2px  6px  rgba(60,64,67,.16),
        0 10px 28px  rgba(60,64,67,.13),
        0 28px 56px  rgba(60,64,67,.10),
        0  0  50px   rgba(26,115,232,.22),
        0  0 100px   rgba(26,115,232,.14),
        0  0 150px   rgba(26,115,232,.07),
        0 -8px 32px  rgba(255,255,255,.75);
      transition: background .35s, box-shadow .35s, border-color .35s;
    }
    .card-face.back { transform: rotateY(180deg); }
    .card-face::before { display: none; }

    /* ── Card header ── */
    .card-header {
      padding: 16px 24px 0;
      display: flex; align-items: center; justify-content: space-between;
    }
    .badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: clamp(9px, 0.85vw, 12px); font-weight: 600; letter-spacing: 0.7px; text-transform: uppercase;
      padding: 4px 10px; border-radius: 6px; border: none;
    }
    .badge::before { content:''; width:5px; height:5px; border-radius:50%; flex-shrink:0; background:currentColor; }
    .badge-q { background: var(--blue-soft);   color: var(--blue); }
    .badge-a { background: var(--blue-soft);   color: var(--blue); }
    .badge-e { background: var(--orange-soft); color: var(--orange); }
    .card-num { font-size: clamp(11px, 1.1vw, 14px); font-weight: 400; color: var(--text-muted); font-variant-numeric: tabular-nums; }

    /* ── Card body ── */
    .card-body {
      flex: 1; min-height: 0;
      display: flex; align-items: center; justify-content: flex-start;
      padding: 20px 48px 16px; text-align: left;
    }

    .card.explained .card-face.front .card-body {
      align-items: flex-start;
      overflow-y: auto;
      padding: 20px 60px 16px;
      scroll-behavior: smooth;
      scrollbar-width: thin;
      scrollbar-color: var(--orange-border) transparent;
    }
    .card.explained .card-face.front .card-body::-webkit-scrollbar { width: 5px; }
    .card.explained .card-face.front .card-body::-webkit-scrollbar-track { background: transparent; }
    .card.explained .card-face.front .card-body::-webkit-scrollbar-thumb {
      background: var(--orange-border); border-radius: 4px;
    }
    .card.explained .card-face.front .card-body::-webkit-scrollbar-thumb:hover {
      background: var(--orange);
    }

    .card-text {
      font-size: clamp(15px, 2.2vh, 26px); font-weight: 500; line-height: 1.58; color: var(--text);
      letter-spacing: -0.01em; text-align: left;
    }
    .answer-text {
      font-size: clamp(20px, 3.4vh, 42px); font-weight: 700; line-height: 1.35; color: var(--blue);
      letter-spacing: -0.02em; text-align: left;
    }

    /* ── Card footer ── */
    .card-footer {
      padding: 6px 24px 12px;
      display: flex; justify-content: center; align-items: center; gap: 12px;
    }

    /* ════════════════════════════════ BUTTONS ════════ */
    button { font-family: 'Inter', sans-serif; }

    .pill-btn {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 600; letter-spacing: .03em; text-transform: none;
      padding: 8px 22px;
      min-width: 140px;
      white-space: nowrap;
      border: 1.5px solid; border-radius: var(--r-btn); cursor: pointer;
      background: transparent;
      position: relative; overflow: hidden;
      transition: transform .18s var(--ease), box-shadow .18s var(--ease),
                  background .18s var(--ease), color .18s var(--ease), border-color .18s;
    }
    .pill-btn::after {
      content:''; position:absolute; inset:0; border-radius:inherit;
      background: rgba(255,255,255,.10); opacity:0; transition:opacity .15s;
    }
    .pill-btn:hover::after { opacity:1; }
    .pill-btn:hover:not(:disabled) { transform: translateY(-2px); }
    .pill-btn:active:not(:disabled) { transform: translateY(0) scale(.97); }
    .pill-btn:disabled { opacity:.30; cursor:default; pointer-events:none; }
    .pill-btn svg { width: clamp(13px, 1.3vw, 20px); height: clamp(13px, 1.3vw, 20px); flex-shrink:0; }

    .reveal-btn {
      background: transparent; color: var(--text-muted);
      border: none; box-shadow: none;
      font-size: 16px; font-weight: 500;
      padding: 0; min-width: unset;
    }
    .reveal-btn:hover:not(:disabled) {
      background: transparent; color: var(--text-sub);
      box-shadow: none; transform: none;
    }
    .reveal-btn.done-state {
      background: transparent; color: var(--green);
      border: none; box-shadow: none; pointer-events: none;
    }

    .explain-btn {
      background: transparent; color: var(--text-muted);
      border: none; box-shadow: none;
      font-size: 16px; font-weight: 500; gap: 6px;
      padding: 0; min-width: unset; border-radius: 0;
    }
    .explain-btn:hover:not(:disabled) {
      background: transparent; color: var(--text-sub);
      box-shadow: none; transform: none;
    }

    [data-theme="dark"] .card-face {
      background: #18181f;
      border: 1.5px solid rgba(124,185,255,.30);
      border-top-color:  rgba(124,185,255,.65);
      border-left-color: rgba(124,185,255,.50);
      box-shadow:
        inset  2px  2px 0  rgba(124,185,255,.22),
        inset -1px -1px 0  rgba(124,185,255,.08),
        0 2px 14px rgba(0,0,0,.55),
        0 0  40px  rgba(124,185,255,.20),
        0 0  80px  rgba(124,185,255,.13),
        0 0 130px  rgba(124,185,255,.07),
        0 0 180px  rgba(167,139,250,.08);
    }
    [data-theme="dark"] .side-nav-btn {
      background: #18181f;
      border: 1.5px solid rgba(124,185,255,.30);
      border-top-color:  rgba(124,185,255,.60);
      border-left-color: rgba(124,185,255,.45);
      box-shadow:
        inset 1px 1px 0  rgba(124,185,255,.20),
        0 2px 10px rgba(0,0,0,.5),
        0 0 30px   rgba(124,185,255,.20),
        0 0 60px   rgba(124,185,255,.12),
        0 0 90px   rgba(167,139,250,.07);
    }
    [data-theme="dark"] .side-nav-btn:hover:not(:disabled) {
      background: #1e1e2a;
      border-color: rgba(124,185,255,.75);
      box-shadow:
        inset 1px 1px 0  rgba(124,185,255,.30),
        0 4px 18px rgba(0,0,0,.45),
        0 0  40px  rgba(124,185,255,.45),
        0 0  80px  rgba(124,185,255,.28),
        0 0 130px  rgba(124,185,255,.14),
        0 0 180px  rgba(167,139,250,.10);
      color: #7cb9ff;
    }
    [data-theme="dark"] .icon-btn { background: #18181f; border-color: rgba(255,255,255,.08); box-shadow: 0 2px 8px rgba(0,0,0,.4), 0 1px 0 rgba(255,255,255,.04) inset; }
    [data-theme="dark"] .icon-btn:hover { background: #1e1e2a; border-color: rgba(124,185,255,.35); color: #7cb9ff; }
    [data-theme="dark"] .star-btn { color: #3a3858; }
    [data-theme="dark"] .star-btn:hover { color: #fbbf24; }
    [data-theme="dark"] .star-btn.active { color: #fbbf24; }
    [data-theme="dark"] .star-btn.active svg { fill: #fbbf24; stroke: #fbbf24; }
    [data-theme="dark"] .star-pip { background: rgba(251,191,36,.12); border-color: rgba(251,191,36,.28); color: #fbbf24; }
    [data-theme="dark"] .badge-q { background: rgba(124,185,255,.1); color: #7cb9ff; }
    [data-theme="dark"] .badge-a { background: rgba(124,185,255,.1); color: #7cb9ff; }
    [data-theme="dark"] .badge-e { background: rgba(251,146,60,.1); color: #fb923c; }
    [data-theme="dark"] .done-stat { background: #18181f; border-color: rgba(255,255,255,.07); }
    [data-theme="dark"] .done-stat-val { color: #7cb9ff; }

    /* ════════════════════════════════ STAR / IMPORTANT ════════ */
    .star-btn {
      background: transparent; border: none; cursor: pointer;
      padding: 2px; color: var(--text-muted);
      display: flex; align-items: center; justify-content: center;
      transition: color .2s, transform .2s;
      flex-shrink: 0;
    }
    .star-btn:hover { color: #fbbc05; transform: scale(1.25); }
    .star-btn.active { color: #fbbc05; }
    .star-btn.active svg { fill: #fbbc05; stroke: #fbbc05; }

    .card-star-row {
      order: 5; width: 100%;
      display: flex; justify-content: center; align-items: center;
      flex-wrap: wrap; gap: 8px;
      min-height: 28px; margin-top: 4px;
      font-size: 13px;
    }
    .star-row-label { color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
    .star-pip {
      color: #f59600; font-size: 13px; font-weight: 700;
      background: rgba(251,188,5,.14); border: 1px solid rgba(251,188,5,.3);
      padding: 2px 10px; border-radius: 99px;
      cursor: pointer; transition: background .15s;
    }
    .star-pip:hover { background: rgba(251,188,5,.28); }

    /* ════════════════════════════════ CARD LAYOUT ════════ */
    .card-layout {
      width: 100%; max-width: 784px;
      display: flex; flex-direction: row; flex-wrap: wrap;
      align-items: center; gap: 12px;
      margin-bottom: 8px;
    }

    .card-nav-row {
      order: 4; width: 100%;
      display: flex; align-items: center; justify-content: center;
      margin-top: 10px;
    }

    .nav-col { display: flex; flex-direction: column; gap: 10px; align-self: center; flex-shrink: 0; }
    .nav-col-l { order: 1; }
    .nav-col-r { order: 3; }
    .nav-bottom-row { display: none; }

    .side-nav-btn {
      width: 64px; height: 64px;
      border-radius: 50%; flex-shrink: 0; align-self: center;
      border: 1.5px solid rgba(255,255,255,.9);
      border-bottom-color: rgba(160,178,210,.55);
      border-right-color:  rgba(160,178,210,.55);
      background: var(--surface); color: var(--text-sub);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow:
        inset  1px  1px 0  rgba(255,255,255,.95),
        inset -1px -1px 0  rgba(140,160,200,.2),
        0 2px  8px  rgba(60,64,67,.15),
        0 8px 22px  rgba(60,64,67,.12),
        0  0  36px  rgba(26,115,232,.18),
        0  0  70px  rgba(26,115,232,.10);
      transition: background .18s var(--ease), box-shadow .18s var(--ease),
                  transform .18s var(--ease), color .18s;
    }
    .side-nav-btn svg { width: 28px; height: 28px; }
    .side-nav-btn:hover:not(:disabled) {
      color: var(--blue);
      box-shadow:
        inset  1px  1px 0  rgba(255,255,255,.95),
        0  2px  8px  rgba(60,64,67,.14),
        0  8px 24px  rgba(26,115,232,.26),
        0  0   55px  rgba(26,115,232,.22),
        0  0  100px  rgba(26,115,232,.12),
        0  0  160px  rgba(26,115,232,.06);
      transform: scale(1.08);
    }
    .side-nav-btn:active:not(:disabled) { transform: scale(.95); }
    .side-nav-btn:disabled { opacity: .28; cursor: default; }

    /* ════════════════════════════════ KBD HINT ════════ */
    .kbd-hint {
      position: fixed; bottom: 12px; left: 0; right: 0;
      font-size: 13px; color: var(--text-muted);
      display: flex; gap: 18px; align-items: center; flex-wrap: wrap; justify-content: center;
      z-index: 10;
    }
    .kbd { display: inline-flex; align-items: center; gap: 5px; transition: color .2s; }
    .kbd span {
      background: var(--surface); color: var(--text-sub);
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 5px;
      border: 1.5px solid var(--border); border-bottom: 3px solid var(--border-2);
      box-shadow: 0 1px 2px rgba(0,0,0,.05);
      transition: background .25s, color .25s, border-color .25s, box-shadow .25s;
    }
    .kbd.hint-blue   { color: var(--blue); }
    .kbd.hint-green  { color: var(--green); }
    .kbd.hint-orange { color: var(--orange); }
    .kbd.hint-blue   span { background:var(--blue-soft);   color:var(--blue);   border-color:var(--blue-border);   border-bottom-color:var(--blue);   box-shadow:0 2px 8px rgba(26,115,232,.28); }
    .kbd.hint-green  span { background:var(--green-soft);  color:var(--green);  border-color:var(--green-border);  border-bottom-color:var(--green);  box-shadow:0 2px 8px rgba(26,127,60,.28); }

<script>
/* ════ CSV PARSER ════ */
function parseCSV(text) {
  const rows = [];
  let row = [], field = '', inQuotes = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    if (inQuotes) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQuotes = false;
      } else { field += c; }
    } else {
      if (c === '"') { inQuotes = true; }
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); if (row.some(f => f.trim())) rows.push(row); row = []; field = ''; }
      else if (c !== '\r') { field += c; }
    }
  }
  if (field !== '' || row.length > 0) {
    row.push(field);
    if (row.some(f => f.trim())) rows.push(row);
  }
  return rows;
}

/* ════ EXPLANATION PARSER ════ */
function parseExplanation(raw) {
  if (!raw || !raw.trim()) return '';
  const text = raw.trim();

  // Detect inner-CSV format: starts with "Heading","Paragraph" header line
  if (/^"Heading"\s*,\s*"Paragraph"/i.test(text)) {
    const lines = text.split('\n').slice(1); // skip header
    const parts = [];
    for (const line of lines) {
      const trimmed = line.trim();
      if (!trimmed) continue;
      const parsed = parseCSV(trimmed);
      if (parsed.length > 0 && parsed[0].length >= 2) {
        const heading = parsed[0][0].trim();
        const content = parsed[0][1].trim();
        if (heading) parts.push('<b>' + escHtml(heading) + '</b><br>' + content);
        else if (content) parts.push(content);
      } else if (parsed.length > 0 && parsed[0][0].trim()) {
        parts.push(parsed[0][0].trim());
      }
    }
    return parts.join('<br><br>');
  }

  // Plain-text format: identify headings as short lines without trailing period
  const paras = text.split(/\n{2,}/);
  const result = [];
  for (const para of paras) {
    const lines = para.split('\n').map(l => l.trim()).filter(Boolean);
    if (!lines.length) continue;
    if (lines.length === 1) {
      const l = lines[0];
      result.push((l.length < 80 && !l.endsWith('.') && !l.endsWith(',')) ? '<b>' + escHtml(l) + '</b>' : l);
      continue;
    }
    const [first, ...rest] = lines;
    if (first.length < 80 && !first.endsWith('.') && !first.endsWith(',')) {
      result.push('<b>' + escHtml(first) + '</b><br>' + rest.join('<br>'));
    } else {
      result.push(lines.join('<br>'));
    }
  }
  return result.join('<br><br>');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

/* ════ DATA ════ */
let Q = [];
let dots = [];

/* ════ STATE ════ */
let cur = 0, flipped = false, explained = false, streak = 0, best = 0;
const revealed = new Set(), expSet = new Set(), starred = new Set();

/* ════ DOM ════ */
const card          = document.getElementById('card');
const glowRing      = document.getElementById('glow-ring');
const scene         = document.getElementById('scene');
const qEl           = document.getElementById('q-text');
const aEl           = document.getElementById('a-text');

const expBtn        = document.getElementById('explain-btn');
const btnNext       = document.getElementById('btn-next');
const allPrevBtns   = document.querySelectorAll('.nav-prev-btn');
const allNextBtns   = document.querySelectorAll('.nav-next-btn');
const numF          = document.getElementById('card-num-f');
const numB          = document.getElementById('card-num-b');
const progFill      = document.getElementById('progress-fill');
const doneSc        = document.getElementById('done-screen');
const topBar        = document.getElementById('top-bar');
const progWrap      = document.getElementById('progress-wrap');
const dotRow        = document.getElementById('dot-row');
const navRow        = document.getElementById('nav-row');
const cardLayout    = document.getElementById('card-layout');
const kbdHintEl     = document.getElementById('kbd-hint');
const kbdSpace      = document.getElementById('kbd-space');
const kbdExp        = document.getElementById('kbd-explain');
const kbdNav        = document.getElementById('kbd-nav');
const sbadge        = document.getElementById('streak-badge');
const scnt          = document.getElementById('streak-count');
const fbadge        = document.getElementById('front-badge');
const themeBtn      = document.getElementById('theme-btn');
const themeIco      = document.getElementById('theme-icon');
const confetti      = document.getElementById('confetti');
const starBtnF      = document.getElementById('star-btn-f');
const starBtnB      = document.getElementById('star-btn-b');
const starRow       = document.getElementById('card-star-row');
const loadingScreen = document.getElementById('loading-screen');

/* ════ BUILD DOTS ════ */
function buildDots() {
  dotRow.innerHTML = '';
  dots = [];
  Q.forEach((_, i) => {
    const d = document.createElement('span');
    d.className = 'dot' + (i === 0 ? ' cur' : '');
    d.title = 'Card ' + (i + 1);
    dotRow.appendChild(d);
    dots.push(d);
  });
}

/* ════ KBD HINT HIGHLIGHT ════ */
function updateKbdHint() {
  [kbdSpace, kbdExp, kbdNav].forEach(el => el && el.classList.remove('hint-blue','hint-green','hint-orange'));
  if (!flipped) { if (kbdSpace) kbdSpace.classList.add('hint-blue'); }
  else if (!explained) { if (kbdExp) kbdExp.classList.add('hint-orange'); }
  else { if (kbdNav) kbdNav.classList.add('hint-green'); }
}

function refreshDots() {
  dots.forEach((d, i) => {
    d.classList.remove('cur','done','exp');
    if (i === cur)           d.classList.add('cur');
    else if (expSet.has(i))  d.classList.add('exp');
    else if (revealed.has(i)) d.classList.add('done');
  });
}

/* ════ HELPERS ════ */
const pad = n => String(n).padStart(2, '0');

function setGlow(g) { glowRing.className = 'glow-ring ' + g; }

function setRevBtn(done) {
  if (!done) {
    revBtn.classList.remove('done-state');
    revBtn.disabled = false;
    revBtn.innerHTML = 'See answer';
  } else {
    revBtn.classList.add('done-state');
    revBtn.disabled = true;
    revBtn.innerHTML = '<svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M16.707 5.293a1 1 0 010 1.414l-8 8a1 1 0 01-1.414 0l-4-4a1 1 0 011.414-1.414L8 12.586l7.293-7.293a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>Revealed';
  }
}

function bumpStreak(up) {
  if (up) { streak++; if (streak > best) best = streak; }
  else streak = 0;
  if (streak >= 2) { scnt.textContent = streak; sbadge.classList.remove('hidden'); }
  else sbadge.classList.add('hidden');
}

/* ════ THEME ════ */
const moonSvg = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
const sunSvg  = '<circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>';
let dark = false;
themeBtn.addEventListener('click', () => {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  themeIco.innerHTML = dark ? moonSvg : sunSvg;
});

/* ════ LOAD ════ */
function load(idx, instant) {
  qEl.innerHTML = Q[idx].q;
  aEl.innerHTML = Q[idx].a;
  if (window.MathJax) MathJax.typesetPromise([qEl, aEl]);

  if (instant) card.style.transition = 'none';
  card.classList.remove('flipped', 'explained');
  flipped = false; explained = false;

  fbadge.className   = 'badge badge-q';
  fbadge.textContent = 'Question';
  qEl.style.fontSize  = '';
  qEl.style.textAlign = '';
  qEl.style.lineHeight = '';

  if (instant) { card.getBoundingClientRect(); card.style.transition = ''; }

  setRevBtn(false);
  setGlow('q');
  expBtn.disabled = true;

  const ns = pad(idx + 1) + ' / ' + pad(Q.length);
  numF.textContent = ns; numB.textContent = ns;
  progFill.style.width = ((idx / Q.length) * 100) + '%';

  const nextIco = idx === Q.length - 1
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';
  btnNext.disabled = false;
  allPrevBtns.forEach(b => b.disabled = (idx === 0));
  allNextBtns.forEach(b => { b.disabled = false; b.innerHTML = nextIco; });

  refreshDots();
  updateStarBtns(idx);
  updateKbdHint();
}

/* ════ STAR / IMPORTANT ════ */
function updateStarBtns(idx) {
  const on = starred.has(idx);
  [starBtnF, starBtnB].forEach(b => {
    b.classList.toggle('active', on);
    b.title = on ? 'Remove from important' : 'Mark as important';
  });
}

function refreshStarRow() {
  if (starred.size === 0) { starRow.innerHTML = ''; return; }
  const pips = [...starred].sort((a, b) => a - b)
    .map(i => '<span class="star-pip" title="Card ' + (i + 1) + '" onclick="jumpTo(' + i + ')">&#9733;</span>')
    .join('');
  starRow.innerHTML = pips;
}

function toggleStar() {
  if (starred.has(cur)) starred.delete(cur);
  else starred.add(cur);
  updateStarBtns(cur);
  refreshStarRow();
}

function jumpTo(idx) { switchCard(() => { cur = idx; load(cur, false); }); }

/* ════ FLIP → ANSWER ════ */
function flipToAnswer() {
  if (flipped) return;
  flipped = true;
  revealed.add(cur);
  card.classList.add('flipped');
  progFill.style.width = (((cur + 1) / Q.length) * 100) + '%';
  setRevBtn(true);
  setGlow('a');
  bumpStreak(true);
  expBtn.disabled = Q[cur].e ? false : true;
  refreshDots();
  updateKbdHint();
}

/* ════ FLIP → EXPLANATION ════ */
function showExplanation() {
  if (!flipped || explained || !Q[cur].e) return;
  explained = true;
  expSet.add(cur);
  expBtn.disabled = true;

  fbadge.className   = 'badge badge-e';
  fbadge.textContent = 'Explanation';
  qEl.innerHTML = Q[cur].e;
  if (window.MathJax) MathJax.typesetPromise([qEl]);
  qEl.style.fontSize  = '';
  qEl.style.textAlign = 'left';
  qEl.style.lineHeight = '1.58';

  card.classList.remove('flipped');
  card.classList.add('explained');
  setGlow('e');
  refreshDots();
  updateKbdHint();
}

/* ════ NAVIGATE ════ */
function switchCard(fn) {
  scene.classList.add('switching');
  setTimeout(() => { fn(); scene.classList.remove('switching'); }, 210);
}
function goNext() {
  if (cur === Q.length - 1) { showDone(); return; }
  switchCard(() => {
    if (!flipped) bumpStreak(false);
    cur++;
    load(cur, false);
    if (revealed.has(cur)) setTimeout(flipToAnswer, 120);
  });
}
function goPrev() {
  if (cur === 0) return;
  switchCard(() => {
    cur--;
    load(cur, false);
    if (revealed.has(cur)) setTimeout(flipToAnswer, 120);
  });
}

/* ════ CONFETTI ════ */
const COLORS = ['#1a73e8','#34a853','#fbbc05','#ea4335','#7c3aed','#059669','#f97316'];
function launchConfetti() {
  confetti.innerHTML = '';
  confetti.classList.add('on');
  for (let i = 0; i < 90; i++) {
    const p = document.createElement('div');
    p.className = 'cp';
    const sz = 8 + Math.random() * 9;
    p.style.cssText =
      'left:' + (Math.random() * 100) + 'vw;' +
      'width:' + sz + 'px;height:' + (sz * 1.3) + 'px;' +
      'background:' + COLORS[Math.floor(Math.random() * COLORS.length)] + ';' +
      'border-radius:' + (Math.random() > .5 ? '50%' : '2px') + ';' +
      'animation-duration:' + (2.2 + Math.random() * 2.4) + 's;' +
      'animation-delay:' + (Math.random() * .9) + 's;';
    confetti.appendChild(p);
  }
  setTimeout(() => confetti.classList.remove('on'), 5000);
}

/* ════ DONE SCREEN ════ */
function showDone() {
  if (!flipped) bumpStreak(false);
  [topBar, progWrap, dotRow, cardLayout, kbdHintEl].forEach(el => { if (el) el.style.display = 'none'; });

  const pct = Math.round((revealed.size / Q.length) * 100);
  document.getElementById('ds-ans').textContent = revealed.size;
  document.getElementById('ds-exp').textContent = expSet.size;
  document.getElementById('ds-str').textContent = best;
  document.getElementById('ds-pct').textContent = pct + '%';
  document.getElementById('ds-rev').textContent = Q.length;

  const gc = document.getElementById('grade-chip');
  if      (pct >= 90) { gc.textContent = '⭐ Excellent';       gc.className = 'grade-chip grade-a'; }
  else if (pct >= 60) { gc.textContent = '👍 Good Job';        gc.className = 'grade-chip grade-b'; }
  else                { gc.textContent = '📚 Keep Practising'; gc.className = 'grade-chip grade-c'; }

  doneSc.classList.add('visible');
  launchConfetti();
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('done-fill').style.width = pct + '%';
  }));
}

/* ════ RESTART ════ */
function restart() {
  cur = 0; flipped = false; explained = false; streak = 0; best = 0;
  revealed.clear(); expSet.clear(); starred.clear();
  starRow.innerHTML = '';
  sbadge.classList.add('hidden');
  doneSc.classList.remove('visible');
  [topBar, progWrap, cardLayout].forEach(el => { if (el) el.style.display = ''; });
  if (kbdHintEl) kbdHintEl.style.display = '';
  document.getElementById('done-fill').style.width = '0%';
  load(0, true);
}

/* ════ CARD CLICK CYCLE ════ */
document.getElementById('scene').addEventListener('click', e => {
  if (e.target.closest('button')) return;
  if (!flipped)        flipToAnswer();
  else if (!explained) showExplanation();
  else                 load(cur, true);
});

/* ════ EVENTS ════ */
revBtn.addEventListener('click', flipToAnswer);
expBtn.addEventListener('click', showExplanation);
starBtnF.addEventListener('click', e => { e.stopPropagation(); toggleStar(); });
starBtnB.addEventListener('click', e => { e.stopPropagation(); toggleStar(); });
btnNext.addEventListener('click', goNext);
allNextBtns.forEach(b => b.addEventListener('click', goNext));
allPrevBtns.forEach(b => b.addEventListener('click', goPrev));
window.addEventListener('keydown', e => {
  if (['INPUT','TEXTAREA','BUTTON'].includes(e.target.tagName)) return;
  if (e.key === ' ' || e.key === 'Enter') { flipToAnswer(); e.preventDefault(); }
  else if (e.key === 'e' || e.key === 'E') { showExplanation(); }
  else if (e.key === 'ArrowRight') { goNext(); e.preventDefault(); }
  else if (e.key === 'ArrowLeft')  { goPrev(); e.preventDefault(); }
  else if (e.key === 'r' || e.key === 'R') { if (!doneSc.classList.contains('visible')) restart(); }
});

/* ════ INIT — load CSV then start ════ */
function showApp() {
  if (loadingScreen) loadingScreen.style.display = 'none';
  if (topBar)     topBar.style.display     = '';
  if (progWrap)   progWrap.style.display   = '';
  if (cardLayout) cardLayout.style.display = '';
  if (kbdHintEl)  kbdHintEl.style.display  = '';
}

fetch('./questions.csv')
  .then(r => {
    if (!r.ok) throw new Error('HTTP ' + r.status + ': questions.csv not found');
    return r.text();
  })
  .then(csvText => {
    const rows = parseCSV(csvText);
    Q = rows
      .filter(row => row.length >= 2 && row[0].trim())
      .map(row => ({
        q: row[0].trim(),
        a: (row[1] || '').trim(),
        e: row[2] ? parseExplanation(row[2]) : '',
      }));
    if (!Q.length) Q = [{ q: 'No questions found in questions.csv', a: 'Please add questions to the CSV file.', e: '' }];
    buildDots();
    showApp();
    load(0, true);
  })
  .catch(err => {
    Q = [{ q: 'Error loading questions.csv', a: String(err.message || err), e: '' }];
    buildDots();
    showApp();
    load(0, true);
  });
</script>
</body>
