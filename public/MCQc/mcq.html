<!DOCTYPE html>
<html lang="en" data-theme="light" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>MCQ Quiz</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <style>
/* ════════════════════════════════════════════════
   MCQ QUIZ  —  Premium Dark UI
════════════════════════════════════════════════ */
:root {
  --blue:          #1a73e8;
  --blue-soft:     #e8f0fe;
  --blue-border:   #c5d9fc;
  --green:         #1a7f3c;
  --green-soft:    #e6f4ea;
  --green-border:  #b6dfc5;
  --red:           #c62828;
  --red-soft:      #fce8e6;
  --red-border:    #f5a9a7;
  --orange:        #d84315;
  --orange-soft:   #fbe9e7;
  --orange-border: #ffab91;
  --surface:       #ffffff;
  --surface-2:     #f5f7ff;
  --bg:            #f0f4f9;
  --text:          #111827;
  --text-sub:      #4b5563;
  --text-muted:    #9ca3af;
  --border:        #e0e7f5;
  --border-2:      #c9d5ee;
  --sh-sm: 0 1px 2px rgba(0,0,0,.06), 0 2px 6px rgba(0,0,0,.04);
  --sh-md: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
  --r-card: 16px;
  --r-btn:  20px;
  --ease:   cubic-bezier(0.4,0,0.2,1);
}
[data-theme="dark"] {
  --blue:          #7cb9ff;
  --blue-soft:     rgba(102,168,255,.13);
  --blue-border:   rgba(102,168,255,.28);
  --green:         #4ade80;
  --green-soft:    rgba(74,222,128,.12);
  --green-border:  rgba(74,222,128,.30);
  --red:           #f87171;
  --red-soft:      rgba(248,113,113,.12);
  --red-border:    rgba(248,113,113,.30);
  --orange:        #fb923c;
  --orange-soft:   rgba(251,146,60,.12);
  --orange-border: rgba(251,146,60,.30);
  --surface:       #16161a;
  --surface-2:     #1e1e26;
  --bg:            #0d0d10;
  --text:          #f0eeff;
  --text-sub:      #9f9cbf;
  --text-muted:    #5c5a7a;
  --border:        #2a2840;
  --border-2:      #38354e;
  --sh-sm: 0 1px 3px rgba(0,0,0,.6),  0 2px 8px rgba(0,0,0,.45);
  --sh-md: 0 4px 12px rgba(0,0,0,.65), 0 8px 28px rgba(0,0,0,.5);
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  height: 100vh; height: 100dvh;
  overflow: hidden;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 16px clamp(8px, 2.5vw, 32px);
  color: var(--text);
  position: relative;
  transition: background 0.35s ease, color 0.35s ease;
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: radial-gradient(ellipse 90% 50% at 50% -5%, rgba(26,115,232,.07) 0%, transparent 65%);
}
[data-theme="dark"] body::before {
  background:
    radial-gradient(ellipse 70% 45% at 20% 10%,  rgba(102,168,255,.08) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 90%,  rgba(139,92,246,.07)  0%, transparent 60%),
    radial-gradient(ellipse 50% 35% at 50% 50%,  rgba(74,222,128,.03)  0%, transparent 70%);
}
.top-bar, .progress-wrap, .card-layout,
.kbd-hint, .done-screen { position: relative; z-index: 1; }

/* TOP BAR */
.top-bar {
  width: 100%; max-width: 680px;
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 10px;
}
.topic-pill { display: inline-flex; align-items: center; gap: 8px; border-radius: 40px; padding: 4px; }
.topic-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); opacity: .6; }
.topic-label { font-size: 20px; font-weight: 600; color: var(--text-sub); letter-spacing: .01em; }
.hdr-right { display: flex; align-items: center; gap: 10px; }
.streak-badge {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: clamp(11px, 1.1vw, 17px); font-weight: 700; color: #b85c00;
  background: #fff3e0; border: 1px solid #ffcc80;
  border-radius: 20px; padding: 4px 11px;
  transition: opacity .2s var(--ease), transform .2s var(--ease);
}
[data-theme="dark"] .streak-badge { background: rgba(255,167,38,.12); border-color: rgba(255,167,38,.35); color: #ffb74d; }
.streak-badge.hidden { opacity:0; pointer-events:none; transform:scale(0.78); }
.icon-btn {
  width: 44px; height: 44px; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--text-sub); cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  box-shadow: var(--sh-sm);
  transition: background .18s var(--ease), border-color .18s, transform .18s var(--ease);
}
.icon-btn:hover { background: var(--surface-2); border-color: var(--blue); color: var(--blue); transform: scale(1.1); }
[data-theme="dark"] .icon-btn { background: #18181f; border-color: rgba(255,255,255,.08); box-shadow: 0 2px 8px rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.04); }
[data-theme="dark"] .icon-btn:hover { background: #1e1e2a; border-color: rgba(124,185,255,.35); color: #7cb9ff; }

/* PROGRESS */
.progress-wrap { width: 100%; max-width: 680px; margin-bottom: 12px; }
.progress-track { height: 4px; background: var(--border); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; width: 0%; border-radius: 5px; background: #1a73e8; transition: width .55s var(--ease); }

/* CARD LAYOUT */
.card-layout {
  width: 100%; max-width: 784px;
  display: flex; flex-direction: row; flex-wrap: wrap;
  align-items: center; gap: 12px;
  margin-bottom: 8px;
}
.nav-col { display: flex; flex-direction: column; gap: 10px; align-self: center; flex-shrink: 0; }
.nav-col-l { order: 1; }
.nav-col-r { order: 3; }
.nav-bottom-row { display: none; }

/* GLOW RING */
.glow-ring {
  flex: 1; min-width: 0; max-width: 680px;
  width: 100%; order: 2;
  height: clamp(480px, 78vh, 640px);
  display: flex; flex-direction: column;
  border-radius: var(--r-card);
}

/* SCENE */
.scene {
  width: 100%; height: 100%;
  border-radius: var(--r-card);
  display: flex; flex-direction: column;
  background: var(--surface);
  border: 1.5px solid rgba(255,255,255,1);
  border-bottom-color: rgba(150,170,210,.65);
  border-right-color:  rgba(150,170,210,.65);
  box-shadow:
    inset  3px  3px 0   rgba(255,255,255,1),
    inset -1px -1px 0   rgba(130,155,200,.35),
    0  2px  6px  rgba(60,64,67,.16),
    0 10px 28px  rgba(60,64,67,.13),
    0 28px 56px  rgba(60,64,67,.10),
    0  0  50px   rgba(26,115,232,.22),
    0  0 100px   rgba(26,115,232,.14),
    0  0 150px   rgba(26,115,232,.07),
    0 -8px 32px  rgba(255,255,255,.75);
  transition: background .35s, box-shadow .35s, border-color .35s, opacity .2s ease;
  overflow: hidden;
}
.scene.switching { opacity: 0; pointer-events: none; }
[data-theme="dark"] .scene {
  background: #18181f;
  border: 1.5px solid rgba(124,185,255,.30);
  border-top-color:  rgba(124,185,255,.65);
  border-left-color: rgba(124,185,255,.50);
  box-shadow:
    inset  2px  2px 0  rgba(124,185,255,.22),
    inset -1px -1px 0  rgba(124,185,255,.08),
    0 2px 14px rgba(0,0,0,.55),
    0  0  40px  rgba(124,185,255,.20),
    0  0  80px  rgba(124,185,255,.13),
    0  0 130px  rgba(124,185,255,.07),
    0  0 180px  rgba(167,139,250,.08);
}

/* CARD HEADER */
.card-header {
  padding: 16px 24px 0;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: clamp(9px, 0.85vw, 12px); font-weight: 600; letter-spacing: .07em; text-transform: uppercase;
  padding: 4px 10px; border-radius: 6px;
}
.badge::before { content:''; width:5px; height:5px; border-radius:50%; flex-shrink:0; background:currentColor; }
.badge-q { background: var(--blue-soft);   color: var(--blue); }
.badge-c { background: var(--green-soft);  color: var(--green); }
.badge-w { background: var(--red-soft);    color: var(--red); }
[data-theme="dark"] .badge-q { background: rgba(124,185,255,.10); color: #7cb9ff; }
[data-theme="dark"] .badge-c { background: rgba(74,222,128,.10);  color: #4ade80; }
[data-theme="dark"] .badge-w { background: rgba(248,113,113,.10); color: #f87171; }
.card-num { font-size: clamp(11px, 1.1vw, 14px); font-weight: 400; color: var(--text-muted); font-variant-numeric: tabular-nums; }

/* CARD BODY */
.card-body {
  flex: 1; min-height: 0;
  display: flex; flex-direction: column;
  padding: 14px 24px 8px;
  gap: 10px;
  overflow-y: auto;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.card-body::-webkit-scrollbar { width: 4px; }
.card-body::-webkit-scrollbar-track { background: transparent; }
.card-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
.card-body::-webkit-scrollbar-thumb:hover { background: var(--blue-border); }
.card-text { font-size: clamp(14px, 2.2vh, 20px); font-weight: 500; line-height: 1.55; color: var(--text); flex-shrink: 0; }

/* OPTIONS GRID */
.options-grid { flex: 1; min-height: 0; display: flex; flex-direction: column; gap: 8px; }
.option-btn {
  flex: 1; min-height: 46px;
  display: flex; flex-direction: column; align-items: stretch; gap: 4px;
  padding: 8px 14px;
  border-radius: 12px;
  border: 1.5px solid var(--border);
  background: transparent;
  color: var(--text);
  cursor: pointer;
  font-family: inherit;
  font-size: clamp(12px, 1.75vh, 15px); font-weight: 500; line-height: 1.35;
  text-align: left;
  position: relative; overflow: hidden;
  transition:
    border-color .18s var(--ease),
    background .18s var(--ease),
    transform .18s var(--ease),
    box-shadow .18s var(--ease),
    opacity .2s var(--ease);
  -webkit-tap-highlight-color: transparent;
}
.option-btn::after {
  content:''; position:absolute; inset:0; border-radius:inherit;
  background: rgba(255,255,255,.06); opacity:0; transition:opacity .15s;
}
.option-btn:not(:disabled):hover {
  border-color: var(--blue-border);
  background: var(--blue-soft);
  transform: translateX(4px);
  box-shadow: 0 2px 12px rgba(26,115,232,.15);
}
.option-btn:not(:disabled):hover::after { opacity:1; }
.option-btn:not(:disabled):active { transform: translateX(2px) scale(.99); }
[data-theme="dark"] .option-btn { background: rgba(255,255,255,.025); border-color: var(--border); }
[data-theme="dark"] .option-btn:not(:disabled):hover {
  border-color: var(--blue-border);
  background: var(--blue-soft);
  box-shadow: 0 2px 14px rgba(102,168,255,.20);
}
.opt-letter {
  min-width: 28px; width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--border);
  color: var(--text-sub);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
  transition: background .18s, color .18s;
}
[data-theme="dark"] .opt-letter { background: rgba(255,255,255,.07); color: var(--text-muted); }
.opt-main { display: flex; align-items: center; gap: 10px; min-height: 30px; }
.opt-text { flex: 1; }
.opt-icon { flex-shrink: 0; width: 18px; height: 18px; }
.opt-explain {
  font-size: 11.5px; font-weight: 400; line-height: 1.45;
  color: var(--text-muted);
  padding-left: 38px;
  animation: fade-up .25s var(--ease) both;
}
.option-btn.option-correct .opt-explain { color: var(--green); }
.option-btn.option-wrong   .opt-explain { color: var(--red); }
.option-btn.option-eliminated { opacity: 0.35; }
.option-btn.option-eliminated .opt-text { text-decoration: line-through; text-decoration-color: var(--text-muted); }
.option-btn.option-eliminated:not(:disabled):hover {
  opacity: 0.60;
  border-color: var(--orange-border);
  background: var(--orange-soft);
  transform: translateX(2px);
  box-shadow: 0 2px 8px rgba(216,67,21,.12);
}
.option-btn.option-correct {
  border-color: var(--green-border);
  background: var(--green-soft);
  color: var(--green);
  cursor: default; transform: none !important;
  box-shadow: 0 0 0 3px rgba(26,127,60,.10), 0 4px 18px rgba(26,127,60,.18);
}
.option-btn.option-correct .opt-letter { background: var(--green); color: #fff; }
[data-theme="dark"] .option-btn.option-correct { box-shadow: 0 0 0 1px rgba(74,222,128,.22), 0 4px 20px rgba(74,222,128,.22); }
.option-btn.option-wrong {
  border-color: var(--red-border);
  background: var(--red-soft);
  color: var(--red);
  cursor: default; transform: none !important;
  animation: shake .45s var(--ease);
  box-shadow: 0 0 0 3px rgba(198,40,40,.10), 0 4px 18px rgba(198,40,40,.18);
}
.option-btn.option-wrong .opt-letter { background: var(--red); color: #fff; }
[data-theme="dark"] .option-btn.option-wrong { box-shadow: 0 0 0 1px rgba(248,113,113,.22), 0 4px 20px rgba(248,113,113,.22); }
.option-btn.option-dim { opacity: 0.32; cursor: default; pointer-events: none; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  15%      { transform: translateX(-7px); }
  35%      { transform: translateX(6px); }
  55%      { transform: translateX(-4px); }
  75%      { transform: translateX(3px); }
}
body.eliminate-active .option-btn:not([disabled]):not(.option-correct):not(.option-wrong):not(.option-dim):hover {
  border-color: var(--orange-border) !important;
  background: var(--orange-soft) !important;
  box-shadow: 0 2px 12px rgba(216,67,21,.18) !important;
  transform: translateX(2px) !important;
}
body.eliminate-active .option-btn:not([disabled]):not(.option-correct):not(.option-wrong):not(.option-dim):hover .opt-letter {
  background: var(--orange) !important;
  color: #fff !important;
}
.explanation-box {
  flex-shrink: 0;
  border-radius: 10px; padding: 10px 14px;
  font-size: clamp(11px, 1.5vh, 13px); font-weight: 500; line-height: 1.5;
  animation: fade-up .3s var(--ease) both;
}
@keyframes fade-up {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.explanation-box.exp-correct { background: var(--green-soft); border: 1px solid var(--green-border); color: var(--green); }
.explanation-box.exp-wrong   { background: var(--red-soft);   border: 1px solid var(--red-border);   color: var(--text); }
[data-theme="dark"] .explanation-box.exp-wrong { color: var(--text); }

/* CARD FOOTER */
.card-footer {
  padding: 8px 24px 14px;
  display: flex; justify-content: center; align-items: center; gap: 14px;
  flex-shrink: 0;
}
button { font-family: 'Inter', system-ui, sans-serif; }
.pill-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 600; letter-spacing: .03em;
  padding: 8px 20px; min-width: 110px;
  white-space: nowrap;
  border: 1.5px solid; border-radius: var(--r-btn); cursor: pointer;
  background: transparent;
  position: relative; overflow: hidden;
  transition: transform .18s var(--ease), box-shadow .18s, background .18s, color .18s, border-color .18s;
}
.pill-btn::after { content:''; position:absolute; inset:0; border-radius:inherit; background: rgba(255,255,255,.10); opacity:0; transition:opacity .15s; }
.pill-btn:hover::after { opacity:1; }
.pill-btn:hover:not(:disabled) { transform: translateY(-2px); }
.pill-btn:active:not(:disabled) { transform: translateY(0) scale(.97); }
.pill-btn:disabled { opacity:.30; cursor:default; pointer-events:none; }
.negate-btn { color: var(--text-muted); border-color: var(--border); background: transparent; font-size: 12px; min-width: 104px; }
.negate-btn:hover:not(:disabled) { color: var(--orange); border-color: var(--orange-border); background: var(--orange-soft); box-shadow: 0 2px 14px rgba(216,67,21,.18); }
.negate-btn.active { color: var(--orange); border-color: var(--orange-border); background: var(--orange-soft); box-shadow: 0 2px 14px rgba(216,67,21,.22); }
[data-theme="dark"] .negate-btn.active { box-shadow: 0 2px 12px rgba(251,146,60,.22); }

/* STAR BUTTON */
.star-btn {
  background: transparent; border: none; cursor: pointer;
  padding: 2px; color: var(--text-muted);
  display: flex; align-items: center; justify-content: center;
  transition: color .2s, transform .2s;
}
.star-btn svg { fill: none; }
.star-btn:hover { color: #fbbc05; transform: scale(1.25); }
.star-btn:hover svg { fill: #fbbc05; }
.star-btn.active { color: #fbbc05; }
.star-btn.active svg { fill: #fbbc05; stroke: #fbbc05; }
[data-theme="dark"] .star-btn { color: #3a3858; }
[data-theme="dark"] .star-btn:hover { color: #fbbf24; }
[data-theme="dark"] .star-btn.active { color: #fbbf24; }
[data-theme="dark"] .star-btn.active svg { fill: #fbbf24; stroke: #fbbf24; }

/* STAR ROW */
.card-star-row {
  order: 4; width: 100%;
  display: flex; justify-content: center; align-items: center;
  flex-wrap: wrap; gap: 8px; min-height: 28px; margin-top: 4px;
}
.star-pip {
  color: #f59600; font-size: 13px; font-weight: 700;
  background: rgba(251,188,5,.14); border: 1px solid rgba(251,188,5,.30);
  padding: 2px 10px; border-radius: 99px;
  cursor: pointer; transition: background .15s; font-family: inherit;
}
.star-pip:hover { background: rgba(251,188,5,.28); }
[data-theme="dark"] .star-pip { background: rgba(251,191,36,.12); border-color: rgba(251,191,36,.28); color: #fbbf24; }

/* SIDE NAV BUTTONS */
.side-nav-btn {
  width: 64px; height: 64px;
  border-radius: 50%; flex-shrink: 0; align-self: center;
  border: 1.5px solid rgba(255,255,255,.9);
  border-bottom-color: rgba(160,178,210,.55);
  border-right-color:  rgba(160,178,210,.55);
  background: var(--surface); color: var(--text-sub);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow:
    inset  1px  1px 0  rgba(255,255,255,.95),
    inset -1px -1px 0  rgba(140,160,200,.20),
    0 2px  8px  rgba(60,64,67,.15),
    0 8px 22px  rgba(60,64,67,.12),
    0  0  36px  rgba(26,115,232,.18),
    0  0  70px  rgba(26,115,232,.10);
  transition: background .18s var(--ease), box-shadow .18s var(--ease), transform .18s var(--ease), color .18s;
}
.side-nav-btn svg { width: 28px; height: 28px; }
.side-nav-btn:hover:not(:disabled) {
  color: var(--blue);
  box-shadow:
    inset  1px  1px 0  rgba(255,255,255,.95),
    0  2px  8px  rgba(60,64,67,.14),
    0  0   55px  rgba(26,115,232,.24),
    0  0  100px  rgba(26,115,232,.12);
  transform: scale(1.08);
}
.side-nav-btn:active:not(:disabled) { transform: scale(.95); }
.side-nav-btn:disabled { opacity:.28; cursor:default; }
[data-theme="dark"] .side-nav-btn {
  background: #18181f;
  border: 1.5px solid rgba(124,185,255,.30);
  border-top-color:  rgba(124,185,255,.60);
  border-left-color: rgba(124,185,255,.45);
  box-shadow:
    inset 1px 1px 0  rgba(124,185,255,.20),
    0 2px 10px rgba(0,0,0,.5),
    0 0 30px   rgba(124,185,255,.20),
    0 0 60px   rgba(124,185,255,.12);
}
[data-theme="dark"] .side-nav-btn:hover:not(:disabled) {
  background: #1e1e2a;
  border-color: rgba(124,185,255,.75);
  box-shadow:
    inset 1px 1px 0  rgba(124,185,255,.30),
    0 4px 18px rgba(0,0,0,.45),
    0 0  40px  rgba(124,185,255,.45),
    0 0  80px  rgba(124,185,255,.28);
  color: #7cb9ff;
}

/* KBD HINT */
.kbd-hint {
  position: fixed; bottom: 12px; left: 0; right: 0;
  font-size: 13px; color: var(--text-muted);
  display: flex; gap: 18px; align-items: center; flex-wrap: wrap; justify-content: center;
  z-index: 10;
}
.kbd { display: inline-flex; align-items: center; gap: 5px; }
.kbd span {
  background: var(--surface); color: var(--text-sub);
  font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 5px;
  border: 1.5px solid var(--border); border-bottom: 3px solid var(--border-2);
  box-shadow: 0 1px 2px rgba(0,0,0,.05);
  transition: background .25s, color .25s, border-color .25s;
}
.kbd.hint-orange { color: var(--orange); }
.kbd.hint-orange span { background: var(--orange-soft); color: var(--orange); border-color: var(--orange-border); border-bottom-color: var(--orange); box-shadow: 0 2px 8px rgba(216,67,21,.20); }

/* DONE SCREEN */
.done-screen {
  display: none; flex-direction: column; align-items: center; text-align: center;
  width: 100%; max-width: 900px;
}
.done-screen.visible { display: flex; animation: rise-in .5s var(--ease) both; }
@keyframes rise-in {
  from { opacity:0; transform:translateY(30px); }
  to   { opacity:1; transform:translateY(0); }
}
.done-trophy {
  width: 100px; height: 100px; border-radius: 50%;
  background: linear-gradient(135deg, #fff9e6, #ffe082);
  border: 2px solid #ffd54f;
  display: flex; align-items: center; justify-content: center; font-size: 48px;
  box-shadow: 0 4px 28px rgba(255,193,7,.32), 0 0 0 10px rgba(255,193,7,.08);
  margin-bottom: 24px;
  animation: trophy-pop .9s cubic-bezier(0.34,1.56,0.64,1) .2s both;
}
@keyframes trophy-pop {
  from { transform: scale(.15) rotate(-12deg); opacity:0; }
  to   { transform: scale(1)  rotate(0deg);   opacity:1; }
}
.done-title { font-size: 42px; font-weight: 850; letter-spacing: -.025em; color: var(--text); margin-bottom: 10px; }
.done-sub   { font-size: 18px; color: var(--text-sub); margin-bottom: 28px; max-width: 500px; line-height: 1.7; }
.grade-chip {
  display: inline-flex; align-items: center; gap: 8px;
  font-size: 13px; font-weight: 700; padding: 8px 22px; border-radius: 20px;
  border: 1px solid; margin-bottom: 32px;
}
.grade-a { background: var(--green-soft);  color: var(--green);  border-color: var(--green-border); }
.grade-b { background: var(--blue-soft);   color: var(--blue);   border-color: var(--blue-border); }
.grade-c { background: var(--orange-soft); color: var(--orange); border-color: var(--orange-border); }
.done-stats { display: flex; gap: 12px; margin-bottom: 32px; flex-wrap: wrap; justify-content: center; }
.done-stat {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 18px; padding: 20px 32px; min-width: 120px;
  box-shadow: var(--sh-sm);
  transition: transform .2s var(--ease), box-shadow .2s var(--ease), background .3s;
}
.done-stat:hover { transform: translateY(-3px); box-shadow: var(--sh-md); }
.done-stat-val   { font-size: 48px; font-weight: 900; color: var(--blue); line-height:1; margin-bottom:4px; }
.done-stat-label { font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--text-muted); }
[data-theme="dark"] .done-stat { background: #18181f; border-color: rgba(255,255,255,.07); }
[data-theme="dark"] .done-stat-val { color: #7cb9ff; }
.done-bar-wrap { width: 100%; max-width: 360px; margin-bottom: 36px; text-align: left; }
.done-bar-lbl  { display:flex; justify-content:space-between; font-size:12px; font-weight:600; color:var(--text-sub); text-transform:uppercase; letter-spacing:.05em; margin-bottom:9px; }
.done-bar-track { height: 10px; background: var(--border); border-radius: 10px; overflow: hidden; }
.done-bar-fill  { height: 100%; width: 0%; border-radius: 10px; background: linear-gradient(90deg, #1a73e8, #4285f4, #34d399); transition: width 1.3s var(--ease) .4s; }
.done-actions { display:flex; gap:12px; flex-wrap:wrap; justify-content:center; }
.restart-btn {
  font-size: 14px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase;
  background: linear-gradient(135deg, #1a73e8, #1052cc);
  color: #fff; border: none; border-radius: var(--r-btn);
  padding: 13px 42px; cursor: pointer;
  box-shadow: 0 3px 16px rgba(26,115,232,.42);
  transition: background .18s, box-shadow .18s, transform .18s var(--ease);
}
.restart-btn:hover { background: linear-gradient(135deg,#155cc4,#0c43a8); box-shadow:0 6px 24px rgba(26,115,232,.55); transform:translateY(-2px); }
.restart-btn:active { transform: translateY(0); }

/* CONFETTI */
#confetti { position:fixed; inset:0; pointer-events:none; z-index:999; display:none; }
#confetti.on { display:block; }
.cp { position:absolute; top:-20px; border-radius:2px; animation: cf-fall linear forwards; }
@keyframes cf-fall {
  0%   { transform:translateY(0) rotate(0deg) scale(1); opacity:1; }
  80%  { opacity:1; }
  100% { transform:translateY(105vh) rotate(800deg) scale(.5); opacity:0; }
}

/* RESPONSIVE */
@media (max-width: 768px) {
  body { height: auto; min-height: 100dvh; overflow-y: auto; justify-content: flex-start; padding: 16px 12px 80px; }
  .top-bar { margin-bottom: 8px; }
  .icon-btn { width: 36px !important; height: 36px !important; }
  .progress-wrap { margin-bottom: 8px; }
  .card-layout .glow-ring { height: clamp(490px, 80vh, 640px); flex: none; width: 100%; order: 1; }
  .card-layout { justify-content: center; gap: 0; }
  .nav-col { display: none; }
  .card-star-row { order: 2; width: 100%; margin-top: 10px; }
  .nav-bottom-row { display: flex; flex-direction: row; order: 3; gap: 24px; margin-top: 14px; justify-content: center; }
  .card-header { padding: 12px 16px 0 !important; }
  .card-body   { padding: 10px 16px 6px !important; gap: 8px !important; }
  .card-footer { padding: 6px 16px 12px !important; }
  .card-text   { font-size: clamp(13px, 3.8vw, 17px) !important; }
  .option-btn  { font-size: clamp(11px, 3.2vw, 14px) !important; padding: 6px 12px !important; min-height: 40px; }
  .opt-letter  { min-width: 24px !important; width: 24px !important; height: 24px !important; font-size: 11px !important; }
  .pill-btn    { font-size: 11px !important; padding: 7px 14px !important; min-width: 94px !important; }
  .kbd-hint { display: none !important; }
  .done-screen { overflow-y: auto; padding-bottom: 24px; }
  .done-trophy { width: 70px; height: 70px; font-size: 34px; margin-bottom: 14px; }
  .done-title  { font-size: clamp(22px, 6vw, 32px) !important; }
  .done-sub    { font-size: clamp(13px, 3.5vw, 16px) !important; margin-bottom: 16px; }
  .grade-chip  { font-size: 12px; padding: 6px 16px; margin-bottom: 18px; }
  .done-stats  { gap: 8px; margin-bottom: 18px; }
  .done-stat   { padding: 12px 16px; min-width: 80px; }
  .done-stat-val   { font-size: clamp(26px, 7.5vw, 36px) !important; }
  .done-stat-label { font-size: clamp(9px, 2.4vw, 11px) !important; }
  .restart-btn { font-size: 13px !important; padding: 11px 28px !important; }
}
@media (max-width: 400px) {
  .done-stats { flex-direction: column; align-items: center; }
  .done-stat  { width: 100%; }
}
  </style>
</head>
<body>

  <!-- confetti canvas -->
  <div id="confetti"></div>

      <button class="icon-btn" id="theme-btn" title="Toggle theme" aria-label="Toggle theme">
        <svg id="theme-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>

  <!-- PROGRESS -->
  <div class="progress-wrap" id="progress-wrap">

      <div class="progress-fill" id="progress-fill"></div>

  </div>

  <!-- CARD LAYOUT -->
  <div class="card-layout" id="card-layout">

    <!-- Left nav -->
    <div class="nav-col nav-col-l">
      <button class="side-nav-btn nav-prev-btn" disabled title="Previous (←)">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="side-nav-btn nav-next-btn" title="Next (→)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

  </div><!-- end card-layout -->

  <!-- KBD HINTS -->
  <div class="kbd-hint" id="kbd-hint">
    <span class="kbd"><span>A</span><span>B</span><span>C</span><span>D</span> select</span>
    <span class="kbd hint-orange" id="kbd-n"><span>T</span> try again</span>
    <span class="kbd"><span>←</span><span>→</span> navigate</span>
    <span class="kbd"><span>R</span> restart</span>
  </div>

  <!-- DONE SCREEN -->
  <div class="done-screen" id="done-screen">
    <div class="done-trophy">🏆</div>
    <h2 class="done-title">Quiz Complete!</h2>
    <p class="done-sub" id="done-sub">Great effort. Review your results and keep practising!</p>
    <div class="grade-chip grade-a" id="grade-chip">⭐ Excellent</div>
    <div class="done-stats">
      <div class="done-stat"><div class="done-stat-val" id="ds-total">0</div><div class="done-stat-label">Total</div></div>
      <div class="done-stat"><div class="done-stat-val" id="ds-correct">0</div><div class="done-stat-label">Correct ✓</div></div>
      <div class="done-stat"><div class="done-stat-val" id="ds-wrong">0</div><div class="done-stat-label">Wrong ✗</div></div>
      <div class="done-stat"><div class="done-stat-val" id="ds-streak">0</div><div class="done-stat-label">Best Streak 🔥</div></div>
    </div>
    <div class="done-bar-wrap">
      <div class="done-bar-lbl"><span>Score</span><span id="ds-pct">0%</span></div>
      <div class="done-bar-track"><div class="done-bar-fill" id="done-fill"></div></div>
    </div>
    <div class="done-actions">
      <button class="restart-btn" id="restart-btn">↺ Restart Quiz</button>
    </div>
  </div>

  <script>
// MCQ QUIZ - Standalone (data loaded from ./data.json)

// STATE
let questions    = [];
let cur          = 0;
let answered     = false;
let eliminateMode = false;
let eliminated   = {};
let userAnswers  = [];
let streak       = 0;
let best         = 0;
const starred    = new Set();
let dark         = false;

// DOM
const topBar      = document.getElementById('top-bar');
const progWrap    = document.getElementById('progress-wrap');
const cardLayout  = document.getElementById('card-layout');
const kbdHint     = document.getElementById('kbd-hint');
const doneSc      = document.getElementById('done-screen');
const progFill    = document.getElementById('progress-fill');
const qTitle      = document.getElementById('quiz-title');
const cardBadge   = document.getElementById('card-badge');
const cardNum     = document.getElementById('card-num');
const qText       = document.getElementById('q-text');
const optGrid     = document.getElementById('options-grid');
const cardBody    = document.getElementById('card-body');
const scene       = document.getElementById('scene');
const negateBtn   = document.getElementById('negate-btn');
const starBtn     = document.getElementById('star-btn');
const sbadge      = document.getElementById('streak-badge');
const scnt        = document.getElementById('streak-count');
const starRow     = document.getElementById('card-star-row');
const themeBtn    = document.getElementById('theme-btn');
const themeIco    = document.getElementById('theme-icon');
const confettiEl  = document.getElementById('confetti');
const restartBtn  = document.getElementById('restart-btn');
const allPrevBtns = document.querySelectorAll('.nav-prev-btn');
const allNextBtns = document.querySelectorAll('.nav-next-btn');

function shuffleArray(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const pad = n => String(n).padStart(2, '0');

async function init() {
  try {
    const res = await fetch('./data.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();

    qTitle.textContent = data.quiz_title || 'Quiz';
    document.title     = data.quiz_title || 'MCQ Quiz';

    questions = shuffleArray([...data.questions]).map(q => {
      const opts = shuffleArray(
        q.options.map((o, i) => ({
          text: o.text,
          explanation: o.explanation || '',
          isCorrect: i === q.correct_answer
        }))
      );
      return {
        question: q.question,
        options: opts,
        correct_answer: opts.findIndex(o => o.isCorrect)
      };
    });

    userAnswers = new Array(questions.length).fill(null);
    load(0);
  } catch (e) {
    scene.innerHTML =
      `<div style="display:flex;align-items:center;justify-content:center;
        height:100%;padding:32px;text-align:center;
        color:var(--red);font-weight:600;font-size:15px;">
        Could not load quiz data.<br><small style="font-weight:400;color:var(--text-muted);margin-top:8px;display:block;">${e.message}</small>
      </div>`;
  }
}

function load(idx) {
  cur      = idx;
  answered = userAnswers[idx] !== null;

  qText.textContent   = questions[idx].question;
  cardNum.textContent = `${pad(idx + 1)} / ${pad(questions.length)}`;
  progFill.style.width = `${((idx + (answered ? 1 : 0)) / questions.length) * 100}%`;

  updateBadge();
  renderOptions();

  allPrevBtns.forEach(b => { b.disabled = idx === 0; });
  const isLast = idx === questions.length - 1;
  const checkIco = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
  const nextIco  = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`;
  allNextBtns.forEach(b => { b.disabled = false; b.innerHTML = isLast ? checkIco : nextIco; });

  const on = starred.has(idx);
  starBtn.classList.toggle('active', on);
  starBtn.title = on ? 'Remove from important' : 'Mark as important (S)';

  negateBtn.classList.toggle('active', eliminateMode);
  document.body.classList.toggle('eliminate-active', eliminateMode);

  updateStreakBadge();
}

function updateBadge() {
  const ua = userAnswers[cur];
  if (ua === null) {
    cardBadge.className = 'badge badge-q';
    cardBadge.textContent = 'Question';
  } else if (ua.isCorrect) {
    cardBadge.className = 'badge badge-c';
    cardBadge.textContent = 'Correct Answer \u2714';
  } else {
    cardBadge.className = 'badge badge-w';
    cardBadge.textContent = 'Wrong Answer \u2716';
  }
}

function renderOptions() {
  const q    = questions[cur];
  const elim = eliminated[cur] || new Set();
  const ua   = userAnswers[cur];

  cardBody.querySelector('.explanation-box')?.remove();

  const LABELS = ['A', 'B', 'C', 'D', 'E'];

  optGrid.innerHTML = q.options.map((opt, i) => {
    const letter = LABELS[i] || String(i + 1);
    let cls = 'option-btn';
    let iconHtml = '';

    if (ua !== null) {
      if (i === q.correct_answer) {
        cls += ' option-correct';
        iconHtml = `<svg class="opt-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
      } else if (i === ua.sel) {
        cls += ' option-wrong';
        iconHtml = `<svg class="opt-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
      } else {
        cls += ' option-dim';
      }
    } else if (elim.has(i)) {
      cls += ' option-eliminated';
    }

    const showExplain = ua !== null && (i === q.correct_answer || i === ua.sel) && opt.explanation;
    return `<button class="${cls}" data-idx="${i}" ${ua !== null ? 'disabled' : ''}>
      <div class="opt-main">
        <span class="opt-letter">${letter}</span>
        <span class="opt-text">${opt.text}</span>
        ${iconHtml}
      </div>
      ${showExplain ? `<span class="opt-explain">${opt.explanation}</span>` : ''}
    </button>`;
  }).join('');

  optGrid.querySelectorAll('.option-btn:not([disabled])').forEach(btn => {
    btn.addEventListener('click', () => handleOptionClick(parseInt(btn.dataset.idx)));
  });

  if (ua !== null) {
    const correctBtn = optGrid.querySelector('.option-correct');
    if (correctBtn) setTimeout(() => correctBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 80);
  }
}

function handleOptionClick(optIdx) {
  if (answered) return;

  const elim = eliminated[cur] || new Set();

  if (eliminateMode) {
    if (elim.has(optIdx)) elim.delete(optIdx);
    else elim.add(optIdx);
    eliminated[cur] = elim;
    renderOptions();
    return;
  }

  const q = questions[cur];
  const isCorrect = optIdx === q.correct_answer;

  userAnswers[cur] = { sel: optIdx, isCorrect };
  answered = true;

  if (isCorrect) { streak++; if (streak > best) best = streak; }
  else           { streak = 0; }

  progFill.style.width = `${((cur + 1) / questions.length) * 100}%`;

  updateStreakBadge();
  updateBadge();
  renderOptions();
}

function updateStreakBadge() {
  if (streak >= 2) {
    scnt.textContent = streak;
    sbadge.classList.remove('hidden');
  } else {
    sbadge.classList.add('hidden');
  }
}

function switchCard(fn) {
  scene.classList.add('switching');
  setTimeout(() => { fn(); scene.classList.remove('switching'); }, 210);
}

function goNext() {
  if (cur === questions.length - 1) { showDone(); return; }
  switchCard(() => load(cur + 1));
}

function goPrev() {
  if (cur === 0) return;
  switchCard(() => load(cur - 1));
}

function tryAgain() {
  userAnswers[cur] = null;
  answered = false;
  eliminateMode = false;
  eliminated[cur] = new Set();
  if (streak > 0) { streak = 0; updateStreakBadge(); }
  negateBtn.classList.remove('active');
  document.body.classList.remove('eliminate-active');
  updateBadge();
  progFill.style.width = `${(cur / questions.length) * 100}%`;
  renderOptions();
}

function toggleStar() {
  if (starred.has(cur)) starred.delete(cur);
  else starred.add(cur);
  const on = starred.has(cur);
  starBtn.classList.toggle('active', on);
  starBtn.title = on ? 'Remove from important' : 'Mark as important (S)';
  refreshStarRow();
}

function refreshStarRow() {
  if (starred.size === 0) { starRow.innerHTML = ''; return; }
  starRow.innerHTML = [...starred].sort((a, b) => a - b)
    .map(i => `<button class="star-pip" data-qi="${i}" title="Jump to Q${i + 1}">\u2605</button>`)
    .join('');
  starRow.querySelectorAll('.star-pip').forEach(btn => {
    btn.addEventListener('click', () => switchCard(() => load(parseInt(btn.dataset.qi))));
  });
}

const CF_COLORS = ['#1a73e8','#34a853','#fbbc05','#ea4335','#7c3aed','#059669','#f97316'];
function launchConfetti() {
  confettiEl.innerHTML = '';
  confettiEl.classList.add('on');
  for (let i = 0; i < 90; i++) {
    const p = document.createElement('div');
    p.className = 'cp';
    const sz = 8 + Math.random() * 9;
    p.style.cssText = `
      left:${Math.random() * 100}vw;
      width:${sz}px; height:${sz * 1.3}px;
      background:${CF_COLORS[Math.floor(Math.random() * CF_COLORS.length)]};
      border-radius:${Math.random() > .5 ? '50%' : '2px'};
      animation-duration:${2.2 + Math.random() * 2.4}s;
      animation-delay:${Math.random() * .9}s;
    `;
    confettiEl.appendChild(p);
  }
  setTimeout(() => confettiEl.classList.remove('on'), 5000);
}

function showDone() {
  [topBar, progWrap, cardLayout, kbdHint].forEach(el => el.style.display = 'none');

  const correctCount = userAnswers.filter(a => a?.isCorrect).length;
  const wrongCount   = userAnswers.filter(a => a && !a.isCorrect).length;
  const pct          = Math.round((correctCount / questions.length) * 100);

  document.getElementById('ds-total').textContent   = questions.length;
  document.getElementById('ds-correct').textContent = correctCount;
  document.getElementById('ds-wrong').textContent   = wrongCount;
  document.getElementById('ds-streak').textContent  = best;
  document.getElementById('ds-pct').textContent     = pct + '%';

  const gc = document.getElementById('grade-chip');
  if (pct >= 90)      { gc.textContent = '\u2B50 Excellent';        gc.className = 'grade-chip grade-a'; }
  else if (pct >= 60) { gc.textContent = '\uD83D\uDC4D Good Job';   gc.className = 'grade-chip grade-b'; }
  else                { gc.textContent = '\uD83D\uDCDA Keep Practising'; gc.className = 'grade-chip grade-c'; }

  doneSc.classList.add('visible');
  if (pct >= 60) launchConfetti();

  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.getElementById('done-fill').style.width = pct + '%';
  }));
}

function restart() {
  cur = 0; answered = false; eliminateMode = false;
  streak = 0; best = 0;
  eliminated = {};
  starred.clear();
  starRow.innerHTML = '';
  sbadge.classList.add('hidden');
  document.body.classList.remove('eliminate-active');
  doneSc.classList.remove('visible');
  [topBar, progWrap, cardLayout, kbdHint].forEach(el => el.style.display = '');
  document.getElementById('done-fill').style.width = '0%';
  progFill.style.width = '0%';

  questions = shuffleArray(questions).map(q => {
    const opts = shuffleArray([...q.options]);
    return { ...q, options: opts, correct_answer: opts.findIndex(o => o.isCorrect) };
  });
  userAnswers = new Array(questions.length).fill(null);
  load(0);
}

const moonSvg = `<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>`;
const sunSvg  = `<circle cx="12" cy="12" r="5"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>`;

themeBtn.addEventListener('click', () => {
  dark = !dark;
  document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
  themeIco.innerHTML = dark ? moonSvg : sunSvg;
  themeBtn.title = dark ? 'Switch to light mode' : 'Switch to dark mode';
});

negateBtn.addEventListener('click', tryAgain);
starBtn.addEventListener('click', toggleStar);
restartBtn.addEventListener('click', restart);
allNextBtns.forEach(b => b.addEventListener('click', goNext));
allPrevBtns.forEach(b => b.addEventListener('click', goPrev));

window.addEventListener('keydown', e => {
  if (['INPUT', 'TEXTAREA', 'BUTTON'].includes(e.target.tagName)) return;
  const k = e.key.toLowerCase();
  if      (k === 'arrowright') { goNext(); e.preventDefault(); }
  else if (k === 'arrowleft')  { goPrev(); e.preventDefault(); }
  else if (k === 'r')          { if (!doneSc.classList.contains('visible')) restart(); }
  else if (k === 't')          { tryAgain(); }
  else if (k === 's')          { toggleStar(); }
  else {
    const map = { a:0, b:1, c:2, d:3, '1':0, '2':1, '3':2, '4':3 };
    if (k in map) {
      const idx = map[k];
      if (idx < (questions[cur]?.options.length ?? 0)) {
        handleOptionClick(idx);
      }
    }
  }
});

init();
  </script>
</body>
